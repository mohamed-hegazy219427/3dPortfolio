[build]
  # Use npm install (not ci) so npm resolves the correct platform-specific
  # native binaries for @tailwindcss/oxide on Netlify's Linux environment.
  # (package-lock.json generated on Windows locks the wrong optional dep.)
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Long-lived cache for Next.js immutable static chunks
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Long-lived cache for public static assets (fonts, icons, models)
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Short cache for HTML — allows Next.js ISR/revalidation
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
